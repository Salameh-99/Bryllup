  .s-rule::before, .s-rule::after{ content:""; height:1px; width:44px; background:linear-gradient(90deg,transparent,var(--gold)); }
  .s-rule::after{ background:linear-gradient(90deg,var(--gold),transparent); }

  .card-pad-sm{ padding:.6rem; }
  .card-pad-md{ padding:1rem 1.3rem; }
  .card{ background:rgba(255,252,246,.88); border:1px solid var(--gold-line); border-radius:20px;
    box-shadow:0 1px 0 rgba(255,255,255,.7) inset, 0 18px 42px var(--gold-shadow);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }

  .letter-card{ padding:2.6rem 1.9rem; text-align:center; position:relative; }
  .letter-card::after{ content:""; position:absolute; inset:12px; border:1px solid var(--gold-line); border-radius:12px; pointer-events:none; }
  .letter-orn{ color:var(--gold); display:flex; justify-content:center; margin-bottom:1.2rem; }
  .letter-orn svg{ width:170px; height:auto; }
  .letter-salut{ font-family:var(--script); font-size:clamp(1.9rem,8vw,2.6rem); color:var(--gold-deep); line-height:1.2; margin-bottom:1.1rem; }
  html[lang="fa"] .letter-salut{ font-family:"Gulzar",serif; font-size:clamp(1.5rem,6vw,2rem); }
  .letter-body{ font-family:var(--display); font-size:1.2rem; line-height:2; color:var(--espresso); max-width:30rem; margin-inline:auto; }
  html[lang="fa"] .letter-body{ font-family:"Vazirmatn",sans-serif; font-size:1.04rem; line-height:1.95; }
  .letter-div{ color:var(--gold); letter-spacing:.45em; margin:1.6rem 0 1rem; }
  .letter-sign{ font-family:var(--ui); font-size:.74rem; letter-spacing:.2em; text-transform:uppercase; color:var(--gold-deep); }
  html[lang="fa"] .letter-sign{ font-family:"Vazirmatn",sans-serif; letter-spacing:0; text-transform:none; font-size:.9rem; }
  .letter-names{ font-family:var(--script); font-size:2rem; color:var(--espresso); margin-top:.2rem; }
  html[lang="fa"] .letter-names{ font-family:"Gulzar",serif; font-size:1.6rem; }

  /* countdown */
  .cd-grid{ display:flex; justify-content:center; gap:0; flex-wrap:wrap; }
  .cd-cell{ flex:1; min-width:68px; max-width:96px; text-align:center; padding:1.2rem .4rem; position:relative; }
  .cd-cell + .cd-cell::before{ content:""; position:absolute; inset-inline-start:0; top:22%; height:56%; width:1px;
    background:linear-gradient(180deg, transparent, var(--gold-line), transparent); }
  .cd-num{ font-family:var(--display); font-weight:600; font-size:clamp(1.9rem,8vw,2.7rem); color:var(--gold-deep); line-height:1; }
  .cd-label{ font-family:var(--ui); font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); margin-top:.5rem; }
  html[lang="fa"] .cd-label{ letter-spacing:0; font-size:.82rem; text-transform:none; }

  /* ── PROGRAM (ren tidslinje) ────────────────────────── */
  .timeline2{ list-style:none; position:relative; max-width:460px; margin-inline:auto; padding:.2rem 0; }
  .timeline2::before{ content:""; position:absolute; inset-inline-start:27px; top:20px; bottom:20px; width:2px;
    background:linear-gradient(var(--gold), rgba(143,106,44,.15)); }
  .tl2{ position:relative; display:grid; grid-template-columns:56px 1fr; gap:1rem; align-items:center; padding:.7rem 0; }
  .tl2 .node{ width:56px; height:56px; border-radius:50%; display:grid; place-items:center;
    background:#fff; border:1px solid var(--gold); color:var(--gold-deep); box-shadow:0 0 0 5px rgba(143,106,44,.08);
    transition:background .45s ease, color .45s ease, box-shadow .45s ease, transform .45s ease; }
  .tl2 .node svg{ width:24px; height:24px; }
  .tl2 .content{ text-align:start; opacity:0; transform:translateX(14px); transition:opacity .5s ease, transform .5s ease; }
  html[lang="fa"] .tl2 .content{ transform:translateX(-14px); }
  .tl2.shown .content{ opacity:1; transform:none; }
  .tl2 .time{ display:block; font-family:var(--display); font-weight:600; font-size:1.35rem; color:var(--gold-deep); line-height:1.15; }
  .tl2 .ev{ display:block; font-family:var(--display); font-size:1.2rem; color:var(--espresso); }
  html[lang="fa"] .tl2 .ev{ font-family:"Vazirmatn",sans-serif; font-size:1.05rem; }
  .tl2.active .node{ background:linear-gradient(180deg,var(--gold-soft),var(--gold)); color:#fff;
    box-shadow:0 0 0 7px rgba(143,106,44,.16); transform:scale(1.08); }

  /* sted */
  .venue-name{ text-align:center; font-family:var(--display); font-weight:600; font-size:1.6rem; color:var(--espresso); }
  .venue-addr{ text-align:center; color:var(--gold-deep); margin:.4rem 0 1.4rem; font-size:.95rem; }
  .map-card{ overflow:hidden; }
  .map-frame{ width:100%; aspect-ratio:16/11; border:0; display:block; }
  .venue-btns{ display:flex; gap:.8rem; margin-top:1.4rem; flex-wrap:wrap; }
  .btn{ flex:1; text-align:center; cursor:pointer; font-family:var(--ui); font-size:.85rem; letter-spacing:.08em; padding:.85rem 1rem; border-radius:999px; text-decoration:none; transition:.2s; white-space:nowrap; }
  html[lang="fa"] .btn{ letter-spacing:0; }
  .btn-gold{ background:linear-gradient(180deg,var(--gold-soft),var(--gold)); color:#fff; font-weight:600; border:1px solid var(--gold); }
  .btn-gold:hover{ filter:brightness(1.05); }
  .btn-ghost{ background:transparent; color:var(--gold-deep); border:1px solid var(--gold); }

  /* galleri */
  #gallery .wrap{ max-width:640px; }
  .gallery{ display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
  .gallery figure{ margin:0; position:relative; overflow:hidden; border-radius:20px; padding:5px;
    background:linear-gradient(155deg, rgba(255,252,246,.95), rgba(232,212,160,.28));

    transition:transform .4s ease, box-shadow .4s ease; }
  .gallery figure:hover{ transform:translateY(-4px); box-shadow:0 1px 0 rgba(255,255,255,.8) inset, 0 22px 48px rgba(90,60,20,.18); }
  .gallery img{ display:block; width:100%; height:100%; aspect-ratio:1/1; object-fit:cover; border-radius:15px; border:none; box-shadow:none; }
  .gallery figure.tall{ grid-row:span 2; }
  .gallery figure.tall img{ aspect-ratio:auto; min-height:100%; }

  /* gave */
  .gift{ padding:1.8rem 1.7rem; text-align:center; font-family:var(--display); font-size:1.12rem; color:var(--espresso); }
  html[lang="fa"] .gift{ font-family:"Vazirmatn",sans-serif; font-size:1rem; }

  /* avslutning */
  .closing{ font-family:var(--script); font-size:clamp(1.7rem,7vw,2.4rem); color:var(--gold-deep); line-height:1.3; max-width:26rem; margin-inline:auto; }
  html[lang="fa"] .closing{ font-family:"Gulzar",serif; font-size:clamp(1.3rem,5.5vw,1.8rem); }

  /* rsvp */
  .rsvp-sub{ text-align:center; color:var(--gold-deep); margin-bottom:1.8rem; font-size:.95rem; }
  .rsvp-card{ padding:1.8rem 1.5rem; }
  .attend-row{ display:flex; gap:.8rem; margin-bottom:1.4rem; }
  .attend-row label{ flex:1; text-align:center; cursor:pointer; border:1px solid var(--gold); color:var(--gold-deep); border-radius:12px; padding:.85rem; transition:.2s; }
  .attend-row input{ position:absolute; opacity:0; width:0; }
  .attend-row label:has(input:checked){ background:linear-gradient(180deg,var(--gold-soft),var(--gold)); color:#fff; font-weight:600; }
  .field{ margin-bottom:1.1rem; }
  .field label{ display:block; font-size:.74rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold-deep); margin-bottom:.45rem; }
  html[lang="fa"] .field label{ letter-spacing:0; font-size:.9rem; text-transform:none; }
  .field input,.field textarea{ width:100%; font-family:var(--body); font-size:1rem; color:var(--ink); background:var(--ivory); border:1px solid var(--gold-line); border-radius:10px; padding:.75rem .85rem; }
  .field input:focus,.field textarea:focus{ outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(191,161,94,.16); }
  .btn-send{ width:100%; margin-top:.3rem; }
  .rsvp-msg{ text-align:center; margin-top:1rem; min-height:1.4rem; font-family:var(--display); font-size:1.2rem; color:var(--gold-deep); }

  footer{ text-align:center; padding:3rem 1.4rem 3.5rem; color:var(--gold-deep); }
  .footer-names{ font-family:var(--script); font-size:2.4rem; color:var(--espresso); }
  html[lang="fa"] .footer-names{ font-family:"Gulzar",serif; font-size:1.8rem; }
  .footer-full{ font-family:var(--ui); font-size:.72rem; letter-spacing:.18em; text-transform:uppercase; color:var(--gold-deep); margin-top:.7rem; }
  html[lang="fa"] .footer-full{ font-family:"Vazirmatn",sans-serif; letter-spacing:0; text-transform:none; font-size:.9rem; }
  .footer-date{ margin-top:.3rem; font-size:.9rem; opacity:.85; }
  .footer-design{ margin-top:1.8rem; font-family:var(--ui); font-size:.68rem; letter-spacing:.14em; text-transform:uppercase; opacity:.55; }
  html[lang="fa"] .footer-design{ letter-spacing:0; text-transform:none; font-size:.78rem; }
  .footer-design a{ color:var(--gold-deep); text-decoration:none; border-bottom:1px solid rgba(122,85,32,.22); transition:color .2s, border-color .2s, opacity .2s; }
  .footer-design a:hover{ opacity:1; color:var(--gold); border-color:var(--gold); }

  /* bunn-nav */
  .nav{ position:fixed; bottom:0; inset-inline:0; z-index:55; height:calc(66px + env(safe-area-inset-bottom)); padding-bottom:env(safe-area-inset-bottom); display:flex; align-items:center; justify-content:space-around;
    background:rgba(255,252,246,.82); border-top:1px solid var(--gold-line); padding-inline:.6rem; box-shadow:0 -8px 24px var(--gold-shadow);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); }
  .nav a, .nav button{ background:none; border:none; cursor:pointer; color:var(--gold-deep); display:flex; flex-direction:column; align-items:center; gap:3px; font-family:var(--body); font-size:.6rem; opacity:.85; transition:.2s; flex:1; }
  html[lang="fa"] .nav a, html[lang="fa"] .nav button{ font-size:.66rem; }
  .nav a:hover, .nav button:hover{ opacity:1; color:var(--gold); }
  .nav svg{ width:22px; height:22px; }
  .nav .center{ flex:none; width:56px; height:56px; margin-top:-22px; border-radius:50%; background:linear-gradient(180deg,#fff,#f8f2da); color:var(--gold); justify-content:center; align-items:center; box-shadow:0 6px 18px var(--gold-glow); opacity:1; border:1px solid rgba(191,161,94,.22); }
  .nav .center svg{ width:28px; height:28px; }
  .nav .center svg circle{ fill:var(--gold); stroke:none; }
  .nav .center span{ display:none; }

  #autoCtrl{ position:fixed; bottom:80px; inset-inline-start:14px; z-index:58; width:42px; height:42px; border-radius:50%; border:1px solid var(--gold-line); background:rgba(255,253,247,.95); color:var(--gold-deep); display:none; place-items:center; cursor:pointer; opacity:.9; box-shadow:0 4px 12px var(--gold-shadow); }
  #autoCtrl.show{ display:grid; }
  #autoCtrl svg{ width:18px; height:18px; }

  .reveal{ opacity:0; transform:translateY(22px); transition:opacity .7s ease, transform .7s ease; }
  .reveal.in{ opacity:1; transform:none; }
  @media (prefers-reduced-motion:reduce){
    .scroll-cue, .seal{ animation:none !important; }

    .reveal, .tl2, .tl2 .content{ opacity:1; transform:none; }
  }

  svg{ stroke-linecap:round; stroke-linejoin:round; }
</style>

<script>
(function(){
  const $ = id => document.getElementById(id);
  let lang = "no";
  const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  const ICONS = {
    welcome:  '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>',
    ceremony: '<circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l3 3"></path>',
    dinner:   '<rect x="3" y="7" width="18" height="14" rx="2" ry="2"></rect><path d="M12 7v14"></path><path d="M3 12h18"></path>',
    music:    '<path d="M9 17V5l12-2v12"></path><circle cx="6" cy="17" r="3"></circle><circle cx="18" cy="15" r="3"></circle>'
  };
  const icon = k => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${ICONS[k]||'<circle cx="12" cy="12" r="3"/>'}</svg>`;

  const ORN = '<svg viewBox="0 0 40 12" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"><path d="M20 2v8"/><path d="M20 4c-3-2-6-1-8 1 2 1 5 1 8-1z"/><path d="M20 4c3-2 6-1 8 1-2 1-5 1-8-1z"/><circle cx="20" cy="6" r="1.3" fill="currentColor" stroke="none"/></svg>';

  const faDigits = s => String(s).replace(/[0-9]/g, d => "۰۱۲۳۴۵۶۷۸۹"[d]);
  const num = n => lang === "fa" ? faDigits(n) : String(n);

  function fmtDate(){
    const d = new Date(CONFIG.date);
    const loc = lang === "fa" ? "fa-IR-u-ca-gregory" : "nb-NO";
    return d.toLocaleDateString(loc,{weekday:"long",day:"numeric",month:"long",year:"numeric"})
         + " · " + d.toLocaleTimeString(loc,{hour:"2-digit",minute:"2-digit"});
  }
  const styleNames = s => {
    if (lang === "fa") return s.replace(/\s+و\s+/g, ' <span class="amp amp-inline">و</span> ');
    const m = s.match(/^(.+?)\s+&\s+(.+)$/);
    if (m) return `<span class="name-part">${m[1]}</span><span class="amp">&</span><span class="name-part">${m[2]}</span>`;
    return s;
  };

  function calLink(){
    const pad=n=>String(n).padStart(2,"0");
    const fmt=dt=>dt.getFullYear()+pad(dt.getMonth()+1)+pad(dt.getDate())+"T"+pad(dt.getHours())+pad(dt.getMinutes())+"00";
    const s=new Date(CONFIG.date), e=new Date(s.getTime()+CONFIG.durationHours*36e5);
    const p=new URLSearchParams({ action:"TEMPLATE", text:(lang==="fa"?"عروسی ":"Bryllup ")+CONFIG.names[lang], dates:fmt(s)+"/"+fmt(e), location:CONFIG.venue.address });
    return "https://calendar.google.com/calendar/render?"+p.toString();
  }

  // ── PROGRAM: kl.slett + hendelse avsløres når punktet blir aktivt ──
  let progItems = [];
  let scrollTicking = false;
  function observeProgram(){
    progItems = Array.from(document.querySelectorAll(".tl2"));
    updateActiveNode();
  }
  function updateActiveNode(){
    if(!progItems.length) return;
    const vc = window.innerHeight/2; let best=null, bd=Infinity;
    progItems.forEach(it => { const r=it.getBoundingClientRect(); const c=r.top+r.height/2; const d=Math.abs(c-vc); if(d<bd){bd=d;best=it;} });
    progItems.forEach(it => {
      const on = (it===best && bd < window.innerHeight*0.5);
      it.classList.toggle("active", on);
      if(on) it.classList.add("shown");
    });
  }
  window.addEventListener("scroll", () => {
    if (scrollTicking) return;
    scrollTicking = true;
    requestAnimationFrame(() => { updateActiveNode(); scrollTicking = false; });
  }, { passive: true });

  function applyImages(){
    const imgs = CONFIG.images || {};
    if(imgs.hero) $("heroImg").src = imgs.hero;
    if(imgs.seal) $("sealImg").src = imgs.seal;
    const gallery = imgs.gallery || [];
    $("galleryGrid").innerHTML = gallery.map(item => {
      const g = typeof item === "string" ? { src: item } : item;
      const cls = g.tall ? ' class="tall"' : "";
      const pos = g.pos ? ` style="object-position:${g.pos}"` : "";
      const alt = g.src.split("/").pop().replace(/\.\w+$/, "").replace(/[-_]/g, " ");
      return `<figure${cls}><img src="${g.src}" alt="${alt}" loading="lazy" decoding="async"${pos}></figure>`;
    }).join("");
  }

  function render(){
    const t=CONFIG.t[lang];
    document.documentElement.lang=lang;
    document.documentElement.dir = lang==="fa" ? "rtl" : "ltr";
    document.title = CONFIG.names[lang];

    $("langBtn").textContent=t.toggle;
    $("coverSub").textContent=t.coverSub;
    $("openBtn").textContent=t.openBtn;

    $("eyebrow").textContent=t.eyebrow;
    $("names").innerHTML=styleNames(CONFIG.names[lang]);
    $("heroDate").textContent=fmtDate();

    $("letterSalut").textContent=t.letterSalut;
    $("letterBody").textContent=t.letter;
    $("letterSign").textContent=t.letterSign;
    $("letterNames").textContent=CONFIG.names[lang];

    $("cdTitle").textContent=t.cdTitle;
    $("programTitle").textContent=t.programTitle;
    $("timeline").innerHTML=CONFIG.program.map(p =>
      `<li class="tl2"><span class="node">${icon(p.icon)}</span>`+
      `<div class="content"><span class="time">${num(p.time)}</span><span class="ev">${p[lang]}</span></div></li>`
    ).join("");
    observeProgram();

    $("venueTitle").textContent=t.venueTitle;
    $("venueName").textContent=CONFIG.venue.name[lang];
    $("venueAddr").textContent=CONFIG.venue.address;
    const q=encodeURIComponent(CONFIG.venue.mapsQuery);
    $("mapFrame").src=`https://www.google.com/maps?q=${q}&output=embed`;
    $("saveBtn").textContent=t.saveDate; $("saveBtn").href=calLink();
    $("dirBtn").textContent=t.directions; $("dirBtn").href=`https://www.google.com/maps/dir/?api=1&destination=${q}`;

    $("galleryTitle").textContent=t.galleryTitle;
    $("gallerySub").textContent=t.gallerySub;

    $("giftTitle").textContent=t.giftTitle;
    $("giftBody").textContent=t.gift;

    $("closingLine").textContent=t.closing;

    $("rsvpTitle").textContent=t.rsvpTitle;
    $("rsvpSub").textContent=CONFIG.rsvpDeadline[lang];
    $("optYes").textContent=t.yes; $("optNo").textContent=t.noBtn;
    $("lName").textContent=t.fName; $("lGuests").textContent=t.fGuests; $("lNotes").textContent=t.fNotes;
    $("sendBtn").textContent=t.send; $("rsvpMsg").textContent="";

    $("footerNames").textContent=CONFIG.names[lang];
    $("footerFull").textContent=CONFIG.fullNames[lang];
    $("footerDate").textContent=fmtDate();
    $("footerDesign").innerHTML=`${t.designCredit} <a href="${CONFIG.design.url}" target="_blank" rel="noopener">${CONFIG.design.brand}</a>`;

    document.querySelectorAll('.nav a[data-k] span').forEach(sp=>{ sp.textContent=t.nav[sp.parentElement.dataset.k]; });

    // ornament rundt seksjonstittler
    document.querySelectorAll('.s-rule').forEach(el=>{ if(!el.querySelector('svg')) el.innerHTML=ORN; });

    updateCenterButton();
    updateCountdown();
  }

  function updateCountdown(){
    const t=CONFIG.t[lang];
    const diff=new Date(CONFIG.date)-new Date();
    const d=Math.max(0,Math.floor(diff/864e5)), h=Math.max(0,Math.floor(diff%864e5/36e5)),
          m=Math.max(0,Math.floor(diff%36e5/6e4)), s=Math.max(0,Math.floor(diff%6e4/1e3));
    $("cdGrid").innerHTML=[d,h,m,s].map((v,i)=>`<div class="cd-cell"><div class="cd-num">${num(String(v).padStart(2,"0"))}</div><div class="cd-label">${t.cdUnits[i]}</div></div>`).join("");
  }
  setInterval(updateCountdown,1000);

  function sendRSVP(){
    const t=CONFIG.t[lang];
    const name=$("rName").value.trim()||"—", guests=$("rGuests").value||"1";
    const att=document.querySelector('input[name="attend"]:checked').value;
    const attTxt=att==="yes"?t.yes:t.noBtn, notes=$("rNotes").value.trim()||"—";
    const body=`${t.fName}: ${name}\n${t.rsvpTitle}: ${attTxt}\n${t.fGuests}: ${guests}\n${t.fNotes}: ${notes}`;
    window.location.href=`mailto:${CONFIG.rsvpEmail}?subject=${encodeURIComponent("RSVP — "+name)}&body=${encodeURIComponent(body)}`;
    $("rsvpMsg").textContent=t.thanks;
  }
  $("sendBtn").addEventListener("click",sendRSVP);
  $("sendBtn").addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();sendRSVP();}});

  // ── media (lyd + video) ──
  const audio=$("bgAudio"); let playing=false, userPaused=false;
  if(CONFIG.musicSrc){ audio.src=CONFIG.musicSrc; audio.preload="auto"; audio.load(); }
  const cvL=$("coverVideoL"), cvR=$("coverVideoR");
  if(CONFIG.videoSrc){
    [cvL,cvR].forEach(v=>{ v.src=CONFIG.videoSrc; v.load(); });
    Promise.all([cvL.play(), cvR.play()]).catch(()=>{});
  } else {
    cvL.style.display="none"; cvR.style.display="none";
  }

  function updateCenterButton(){
    const btn=$("centerBtn"); const icon=$("centerIcon");
    if(!btn || !icon) return;
    const isOn = playing && !userPaused;
    btn.setAttribute("aria-pressed", isOn ? "true" : "false");
    const label = isOn
      ? (lang === "fa" ? "خاموش کردن موسیقی" : "Slå av musikken")
      : (lang === "fa" ? "پخش موسیقی" : "Slå på musikken");
    btn.setAttribute("aria-label", label);
    btn.title = label;
    icon.innerHTML = isOn
      ? '<path d="M9 18V5l10-2v12"></path><circle cx="6" cy="18" r="3"></circle><circle cx="16" cy="16" r="3"></circle>'
      : '<path d="M9 18V5l10-2v12"></path><circle cx="6" cy="18" r="3"></circle><circle cx="16" cy="16" r="3"></circle><path d="M4 4l16 16"></path>';
  }

  function setMusicState(on){
    if(!CONFIG.musicSrc) return;
    if(on){
      audio.play().then(()=>{ playing=true; userPaused=false; updateCenterButton(); }).catch(()=>{});
    } else {
      audio.pause();
      playing=false;
      userPaused=true;
      updateCenterButton();
    }
  }

  function tryMedia(){
    if(CONFIG.videoSrc) [cvL, cvR].forEach(v => v.play().catch(() => {}));
    if(CONFIG.musicSrc && !playing && !userPaused){ audio.play().then(()=>{ playing=true; updateCenterButton(); }).catch(()=>{}); }
  }

  audio.addEventListener("play", ()=>{ playing=true; userPaused=false; updateCenterButton(); });
  audio.addEventListener("pause", ()=>{ playing=false; updateCenterButton(); });
  audio.addEventListener("ended", ()=>{ playing=false; userPaused=true; updateCenterButton(); });

  window.addEventListener("touchend", tryMedia, {passive:true});
  window.addEventListener("click", tryMedia);

  $("centerBtn").addEventListener("click", ()=>{
    if(!CONFIG.musicSrc) return;
    if(playing && !userPaused){
      setMusicState(false);
    } else {
      setMusicState(true);
    }
  });

  $("langBtn").addEventListener("click",()=>{
    lang = lang==="no" ? "fa" : "no";
    document.body.style.opacity="0";
    setTimeout(()=>{ render(); document.body.style.opacity="1"; },180);
  });
  document.body.style.transition="opacity .18s ease";

  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}}),{threshold:.12});
  document.querySelectorAll(".reveal").forEach(el=>io.observe(el));

  // ── auto-scroll ──
  const SCROLL_SPEED=0.9;
  let autoRAF=null, autoOn=false, autoY=0, startedAt=0;
  const maxScroll=()=>document.documentElement.scrollHeight-window.innerHeight;
  function tick(){ if(!autoOn)return; autoY+=SCROLL_SPEED; window.scrollTo(0,autoY); if(autoY>=maxScroll()){autoOn=false;setCtrl(false);return;} autoRAF=requestAnimationFrame(tick); }
  function startAutoScroll(){ autoY=window.scrollY||window.pageYOffset||0; autoOn=true; startedAt=Date.now(); setCtrl(true); document.documentElement.style.scrollBehavior="auto"; cancelAnimationFrame(autoRAF); autoRAF=requestAnimationFrame(tick); }
  function stopAutoScroll(){ autoOn=false; cancelAnimationFrame(autoRAF); setCtrl(false); document.documentElement.style.scrollBehavior=""; }
  function userTookOver(){ if(Date.now()-startedAt>1200 && autoOn) stopAutoScroll(); }
  window.addEventListener("wheel",userTookOver,{passive:true});
  window.addEventListener("touchmove",userTookOver,{passive:true});

  const ctrl=document.createElement("button"); ctrl.id="autoCtrl"; ctrl.setAttribute("aria-label","auto-scroll"); document.body.appendChild(ctrl);
  function setCtrl(on){ ctrl.classList.add("show"); ctrl.innerHTML = on
    ? '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l12 7-12 7z"/></svg>'; }
  ctrl.addEventListener("click",()=> autoOn ? stopAutoScroll() : startAutoScroll());

  function spawnPetals(){
    if(reduceMotion) return;
    for(let i=0;i<16;i++){ const p=document.createElement("div"); p.className="petal"; p.textContent="✦";
      p.style.left=(Math.random()*100)+"vw"; p.style.fontSize=(8+Math.random()*12)+"px";
      p.style.animationDuration=(7+Math.random()*7)+"s"; p.style.animationDelay=(Math.random()*6)+"s";
      document.body.appendChild(p); setTimeout(()=>p.remove(),16000); }
  }

  function spawnSparkles(){
    if(reduceMotion) return;
    const s=$("seal"); if(!s) return;
    const r=s.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
    for(let i=0;i<14;i++){
      const sp=document.createElement("div"); sp.className="spark"; sp.textContent="✦";
      const a=Math.random()*Math.PI*2, dist=60+Math.random()*120;
      sp.style.left=cx+"px"; sp.style.top=cy+"px"; sp.style.fontSize=(8+Math.random()*12)+"px";
      sp.style.setProperty("--dx",(Math.cos(a)*dist).toFixed(0)+"px");
      sp.style.setProperty("--dy",(Math.sin(a)*dist).toFixed(0)+"px");
      document.body.appendChild(sp); setTimeout(()=>sp.remove(),1000);
    }
  }

  let opened=false;
  function openInvitation(){
    if(opened)return; opened=true;
    const c=$("cover");
    setTimeout(spawnSparkles,60);
    document.body.classList.remove("locked");
    c.classList.add("doors-open");
    if(CONFIG.musicSrc){ setMusicState(true); }
    setTimeout(()=>c.classList.add("open"), 1500);
    setTimeout(()=>{ c.style.display="none"; }, 2400);
    setTimeout(()=>{ spawnPetals(); startAutoScroll(); }, 2550);
  }
  $("seal").addEventListener("click",openInvitation);
  $("openBtn").addEventListener("click",openInvitation);

  document.querySelectorAll('a[href^="#"]').forEach(a=>{
    a.addEventListener("click",e=>{ const el=document.getElementById(a.getAttribute("href").slice(1)); if(!el)return; e.preventDefault(); stopAutoScroll(); el.scrollIntoView({behavior:"smooth",block:"start"}); });
  });

  function resetToStart(){
    if("scrollRestoration" in history) history.scrollRestoration="manual";
    scrollTo(0,0);
    document.body.classList.add("locked");
    opened=false;
    autoOn=false;
    cancelAnimationFrame(autoRAF);
    const c=$("cover");
    if(c){
      c.style.display="";
      c.classList.remove("doors-open","open");
    }
    if(location.hash) history.replaceState(null,"",location.pathname+location.search);
  }

  resetToStart();
  addEventListener("load",()=>scrollTo(0,0));
  addEventListener("pageshow",()=>resetToStart());

  applyImages();
  render();
})();
</script>
</body>
</html>
