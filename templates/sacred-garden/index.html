(function(){
  const $ = id => document.getElementById(id);
  const t = CONFIG.t;
  const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
  const DIAMOND = '<svg viewBox="0 0 14 14" fill="currentColor"><path d="M7 1l6 6-6 6-6-6z"/></svg>';

  function fmtDateShort(){
    return new Date(CONFIG.date).toLocaleDateString("nb-NO", { day:"2-digit", month:"2-digit", year:"2-digit" }).replace(/\//g, ".");
  }
  function fmtDateLong(){
    const d = new Date(CONFIG.date);
    return d.toLocaleDateString("nb-NO",{weekday:"long",day:"numeric",month:"long",year:"numeric"})
         + " · " + d.toLocaleTimeString("nb-NO",{hour:"2-digit",minute:"2-digit"});
  }
  function fmtTime(time){
    const [h,m] = time.split(":");
    const hr = +h;
    const ampm = hr >= 12 ? "PM" : "AM";
    const h12 = (hr % 12) || 12;
    return m === "00" ? `${h12} ${ampm}` : `${h12}:${m} ${ampm}`;
  }

  function calLink(){
    const pad=n=>String(n).padStart(2,"0");
    const fmt=dt=>dt.getFullYear()+pad(dt.getMonth()+1)+pad(dt.getDate())+"T"+pad(dt.getHours())+pad(dt.getMinutes())+"00";
    const s=new Date(CONFIG.date), e=new Date(s.getTime()+CONFIG.durationHours*36e5);
    const p=new URLSearchParams({ action:"TEMPLATE", text:"Bryllup "+CONFIG.nameFirst+" & "+CONFIG.nameSecond, dates:fmt(s)+"/"+fmt(e), location:CONFIG.venue.address });
    return "https://calendar.google.com/calendar/render?"+p.toString();
  }

  function applyMedia(){
    const imgs = CONFIG.images || {};
    if(imgs.envelope) $("envelopeImg").src = imgs.envelope;
    if(imgs.arch) $("archImg").src = imgs.arch;
    if(imgs.roseLeft) $("roseLeft").src = imgs.roseLeft;
    if(imgs.roseRight) $("roseRight").src = imgs.roseRight;
    if(imgs.roseLeft) $("detailRoseL").src = imgs.roseLeft;
    if(imgs.roseRight) $("detailRoseR").src = imgs.roseRight;
    if(imgs.hero) $("heroImg").src = imgs.hero;
    if(imgs.mapFrame) $("mapFrameImg").src = imgs.mapFrame;
    if(imgs.programBg) $("programBg").src = imgs.programBg;
    if(imgs.acommDecor) $("programAcomm").src = imgs.acommDecor;
    document.querySelectorAll('[id^="flourish"]').forEach(el => { if(imgs.decorFlourish) el.src = imgs.decorFlourish; });
    document.querySelectorAll(".tl-sprig-l").forEach(el => { if(imgs.programSprigLeft) el.src = imgs.programSprigLeft; });
    document.querySelectorAll(".tl-sprig-r").forEach(el => { if(imgs.programSprigRight) el.src = imgs.programSprigRight; });

    const cv = $("coverVideo");
    if(CONFIG.coverVideo){ cv.src = CONFIG.coverVideo; cv.load(); cv.play().catch(()=>{}); }
    else cv.style.display = "none";

    const hv = $("heroVideo"), hm = $("heroMedia");
    if(CONFIG.heroVideo){ hv.src = CONFIG.heroVideo; hv.load(); hm.classList.remove("no-video"); document.body.classList.remove("no-video"); }
    else { hm.classList.add("no-video"); document.body.classList.add("no-video"); }
  }

  function render(){
    document.title = CONFIG.nameFirst + " & " + CONFIG.nameSecond;

    $("coverTap").textContent = t.coverTap;
    $("sealInitials").textContent = CONFIG.initials;

    $("heroLabel").textContent = t.weddingDay;
    $("heroDateShort").textContent = fmtDateShort();
    $("heroNames").innerHTML =
      `<span class="hero-name">${CONFIG.nameFirst}</span>`+
      `<span class="hero-amp">&</span>`+
      `<span class="hero-name">${CONFIG.nameSecond}</span>`;
    $("scrollCue").textContent = t.scrollDown;

    $("bismillah").textContent = t.bismillah;
    $("tagline").innerHTML = t.tagline.map(l => `<p>${l}</p>`).join("");
    $("letterSalut").textContent = t.letterSalut;
    $("letterBody").textContent = t.letter;

    $("cdTitle").textContent = t.cdTitle;
    $("programTitle").textContent = t.programTitle;
    buildCountdown();

    const roseImg = CONFIG.images?.roseMarker || "";
    const sprigL = CONFIG.images?.programSprigLeft || "";
    const sprigR = CONFIG.images?.programSprigRight || "";
    $("timeline").innerHTML = CONFIG.program.map((p,i) => {
      let marker = DIAMOND;
      if(p.rose && roseImg){
        marker =
          (sprigL ? `<img class="tl-sprig tl-sprig-l" src="${sprigL}" alt="" aria-hidden="true">` : "")+
          `<img class="tl-rose" src="${roseImg}" alt="">`+
          (sprigR ? `<img class="tl-sprig tl-sprig-r" src="${sprigR}" alt="" aria-hidden="true">` : "");
      }
      return `<li class="tl-item${p.rose ? " rose-event" : ""}" style="--i:${i}"><span class="tl-time">${fmtTime(p.time)}</span>`+
        `<span class="tl-marker">${marker}</span>`+
        `<span class="tl-event">${p.label}</span></li>`;
    }).join("");

    $("venueTitle").textContent = t.venueTitle;
    $("venueName").textContent = CONFIG.venue.name;
    $("venueAddr").textContent = CONFIG.venue.address;
    const q = encodeURIComponent(CONFIG.venue.mapsQuery);
    $("mapFrame").src = `https://www.google.com/maps?q=${q}&output=embed`;
    $("saveBtn").textContent = t.saveDate; $("saveBtn").href = calLink();
    $("dirBtn").textContent = t.directions; $("dirBtn").href = `https://www.google.com/maps/dir/?api=1&destination=${q}`;

    $("dressTitle").textContent = t.dressTitle;
    $("dressBody").textContent = t.dress;
    $("giftTitle").textContent = t.giftTitle;
    $("giftBody").textContent = t.gift;

    $("rsvpTitle").textContent = t.rsvpTitle;
    $("rsvpIntro").textContent = t.rsvpIntro;
    $("rsvpDeadline").textContent = CONFIG.rsvpDeadline || "";
    $("rsvpOpenHint").textContent = t.rsvpOpen;
    $("modalTitle").textContent = t.rsvpTitle;
    $("optYes").textContent = t.yes; $("optNo").textContent = t.noBtn;
    $("lName").textContent = t.fName; $("lGuests").textContent = t.fGuests;
    $("lSong").textContent = t.fSong; $("lChildren").textContent = t.fChildren;
    $("lNotes").textContent = t.fNotes;
    $("sendBtn").textContent = t.send; $("rsvpMsg").textContent = "";

    $("closingLine").textContent = t.closing;
    $("footerNames").textContent = CONFIG.fullNames;
    $("footerDate").textContent = fmtDateLong();
    $("footerDesign").innerHTML = `${t.designCredit} <a href="${CONFIG.design.url}" target="_blank" rel="noopener">${CONFIG.design.brand}</a>`;

    document.querySelectorAll('.nav a[data-k] span').forEach(sp => {
      sp.textContent = t.nav[sp.parentElement.dataset.k];
    });

    updateCountdown();
    updateCenterButton();
  }

  let prevCd = [null,null,null,null];
  let cdNums = null;
  function buildCountdown(){
    $("cdRow").innerHTML = [0,1,2,3].map(i => {
      const unit = `<div class="cd-unit"><div class="cd-num" data-i="${i}">00</div><div class="cd-label">${t.cdUnits[i]}</div></div>`;
      return i < 3 ? unit + `<span class="cd-sep">:</span>` : unit;
    }).join("");
    cdNums = [...document.querySelectorAll(".cd-num")];
    prevCd = [null,null,null,null];
  }
  function updateCountdown(){
    if(!cdNums) buildCountdown();
    const diff = new Date(CONFIG.date) - new Date();
    const vals = [
      Math.max(0, Math.floor(diff/864e5)),
      Math.max(0, Math.floor(diff%864e5/36e5)),
      Math.max(0, Math.floor(diff%36e5/6e4)),
      Math.max(0, Math.floor(diff%6e4/1e3))
    ];
    vals.forEach((v,i) => {
      const el = cdNums[i];
      const txt = String(v).padStart(2,"0");
      if(el.textContent !== txt){
        if(prevCd[i] !== null) el.classList.add("tick");
        el.textContent = txt;
        setTimeout(()=>el.classList.remove("tick"), 360);
      }
      prevCd[i] = v;
    });
  }
  setInterval(updateCountdown, 1000);

  function sendRSVP(){
    const name = $("rName").value.trim() || "—";
    const guests = $("rGuests").value || "1";
    const song = $("rSong").value.trim() || "—";
    const children = $("rChildren").value.trim() || "—";
    const att = document.querySelector('input[name="attend"]:checked').value;
    const attTxt = att === "yes" ? t.yes : t.noBtn;
    const notes = $("rNotes").value.trim() || "—";
    const body = `${t.fName}: ${name}\n${t.rsvpTitle}: ${attTxt}\n${t.fGuests}: ${guests}\n${t.fSong}: ${song}\n${t.fChildren}: ${children}\n${t.fNotes}: ${notes}`;
    window.location.href = `mailto:${CONFIG.rsvpEmail}?subject=${encodeURIComponent("RSVP — "+name)}&body=${encodeURIComponent(body)}`;
    $("rsvpMsg").textContent = t.thanks;
  }

  $("sendBtn").addEventListener("click", sendRSVP);
  $("rsvpOpenBtn").addEventListener("click", () => { $("rsvpModal").classList.add("open"); $("rsvpModal").setAttribute("aria-hidden","false"); });
  $("modalClose").addEventListener("click", closeModal);
  $("rsvpModal").addEventListener("click", e => { if(e.target === $("rsvpModal")) closeModal(); });
  function closeModal(){ $("rsvpModal").classList.remove("open"); $("rsvpModal").setAttribute("aria-hidden","true"); }

  const audio = $("bgAudio"); let playing = false, userPaused = false;
  if(CONFIG.musicSrc){ audio.src = CONFIG.musicSrc; audio.preload = "auto"; audio.load(); }

  function updateCenterButton(){
    const btn = $("centerBtn"), icon = $("centerIcon");
    if(!btn || !icon) return;
    if(!CONFIG.musicSrc){
      btn.classList.add("muted");
      btn.setAttribute("aria-label", t.nav.music);
      return;
    }
    btn.classList.remove("muted");
    const isOn = playing && !userPaused;
    btn.setAttribute("aria-pressed", isOn ? "true" : "false");
    btn.setAttribute("aria-label", isOn ? "Slå av musikken" : "Slå på musikken");
    icon.innerHTML = isOn
      ? '<path d="M9 18V5l10-2v12"/><circle cx="6" cy="18" r="3"/><circle cx="16" cy="16" r="3"/>'
      : '<path d="M9 18V5l10-2v12"/><circle cx="6" cy="18" r="3"/><circle cx="16" cy="16" r="3"/><path d="M4 4l16 16"/>';
  }
  function setMusicState(on){
    if(!CONFIG.musicSrc) return;
    if(on) audio.play().then(()=>{ playing=true; userPaused=false; updateCenterButton(); }).catch(()=>{});
    else { audio.pause(); playing=false; userPaused=true; updateCenterButton(); }
  }
  $("centerBtn").addEventListener("click", ()=>{
    if(!CONFIG.musicSrc) return;
    if(playing && !userPaused) setMusicState(false); else setMusicState(true);
  });

  let revealIo, programIo;
  function observeScrollAnimations(){
    if(revealIo) revealIo.disconnect();
    if(programIo) programIo.disconnect();

    revealIo = new IntersectionObserver(es => es.forEach(e => {
      if(e.isIntersecting){ e.target.classList.add("in"); revealIo.unobserve(e.target); }
    }), { threshold: .15, rootMargin: "0px 0px -8% 0px" });
    document.querySelectorAll(".reveal").forEach(el => {
      el.classList.remove("in");
      revealIo.observe(el);
    });

    const timeline = $("timeline");
    const programPanel = $("programPanel");
    if(timeline && programPanel){
      timeline.classList.remove("show");
      programIo = new IntersectionObserver(es => es.forEach(e => {
        if(e.isIntersecting){
          timeline.classList.add("show");
          programIo.disconnect();
        }
      }), { threshold:.4, rootMargin: "0px 0px -12% 0px" });
      programIo.observe(programPanel);
    }
  }

  function spawnSparkles(){
    if(reduceMotion) return;
    const s = $("seal"); if(!s) return;
    const r = s.getBoundingClientRect(), cx = r.left + r.width/2, cy = r.top + r.height/2;
    for(let i=0;i<12;i++){
      const sp = document.createElement("div"); sp.className = "spark"; sp.textContent = "✦";
      const a = Math.random()*Math.PI*2, dist = 50 + Math.random()*100;
      sp.style.left = cx+"px"; sp.style.top = cy+"px"; sp.style.fontSize = (7+Math.random()*10)+"px";
      sp.style.setProperty("--dx", (Math.cos(a)*dist).toFixed(0)+"px");
      sp.style.setProperty("--dy", (Math.sin(a)*dist).toFixed(0)+"px");
      document.body.appendChild(sp); setTimeout(()=>sp.remove(),900);
    }
  }
  function spawnPetals(){
    if(reduceMotion) return;
    for(let i=0;i<14;i++){
      const p = document.createElement("div"); p.className = "petal"; p.textContent = "✦";
      p.style.left = (Math.random()*100)+"vw"; p.style.fontSize = (7+Math.random()*10)+"px";
      p.style.animationDuration = (6+Math.random()*6)+"s"; p.style.animationDelay = (Math.random()*4)+"s";
      document.body.appendChild(p); setTimeout(()=>p.remove(),14000);
    }
  }

  const OPEN = { seal:0, lift:180, hero:420, petals:780, hide:1320 };

  let opened = false;
  function openInvitation(){
    if(opened) return; opened = true;
    const cover = $("cover");
    const cv = $("coverVideo");
    const flash = $("openFlash");

    spawnSparkles();
    if(flash){ flash.classList.add("on"); setTimeout(()=>flash.classList.remove("on"), 900); }

    if(cv){ cv.play().catch(()=>{}); }
    cover.classList.add("opening");
    document.body.classList.remove("locked");

    setTimeout(() => {
      document.body.classList.add("invitation-open");
      const hv = $("heroVideo");
      if(hv && CONFIG.heroVideo) hv.play().catch(()=>{});
      if(CONFIG.musicSrc) setMusicState(true);
    }, OPEN.hero);

    setTimeout(spawnPetals, OPEN.petals);
    setTimeout(() => {
      if(cv){ cv.pause(); }
      cover.classList.add("done");
      cover.style.display = "none";
      observeScrollAnimations();
      initScrollSpy();
    }, OPEN.hide);
  }
  $("cover").addEventListener("click", openInvitation);
  $("seal").addEventListener("click", e => { e.stopPropagation(); openInvitation(); });

  document.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener("click", e => {
      const el = document.getElementById(a.getAttribute("href").slice(1));
      if(!el) return;
      e.preventDefault();
      el.scrollIntoView({ behavior:"smooth", block:"start" });
    });
  });

  const spySections = ["home","intro","program","place","rsvp"];
  let spyIo;
  function initScrollSpy(){
    if(spyIo) spyIo.disconnect();
    const links = [...document.querySelectorAll('.nav a[href^="#"]')];
    spyIo = new IntersectionObserver(es => {
      const visible = es.filter(e => e.isIntersecting).sort((a,b) => b.intersectionRatio - a.intersectionRatio);
      if(!visible.length) return;
      const id = visible[0].target.id;
      links.forEach(l => l.classList.toggle("active", l.getAttribute("href") === "#"+id));
    }, { threshold: [.2,.35,.5], rootMargin: "-20% 0px -55% 0px" });
    spySections.forEach(id => {
      const el = document.getElementById(id);
      if(el) spyIo.observe(el);
    });
  }

  function resetToStart(){
    scrollTo(0,0);
    document.body.classList.add("locked");
    document.body.classList.remove("invitation-open");
    opened = false;
    const c = $("cover");
    if(c){ c.style.display=""; c.classList.remove("opening","done"); }
    $("timeline")?.classList.remove("show");
    document.querySelectorAll(".reveal,.tl-item").forEach(el => el.classList.remove("in"));
    closeModal();
    if(location.hash) history.replaceState(null,"",location.pathname+location.search);
  }

  resetToStart();
  addEventListener("pageshow", resetToStart);
  applyMedia();
  render();
})();
</script>
</body>
</html>
